# Render 배포 설정
# 공식 문서: https://render.com/docs/yaml-spec

services:
  # ─── 백엔드 API (NestJS) ─────────────────────────────
  - type: web
    name: anotherone-api
    runtime: node
    region: singapore   # 한국과 가장 가까운 리전
    plan: free          # free | starter | standard 등

    # 모노레포 루트에서 빌드
    rootDir: .
    buildCommand: |
      npm install --include=dev
      npx prisma generate --schema=packages/db/prisma/schema.prisma
      npm run build --workspace=@anotherone/api
      npx prisma db push --schema=packages/db/prisma/schema.prisma

    startCommand: node apps/api/dist/main.js

    # 자동 배포 (main 브랜치 push 시)
    autoDeploy: true
    branch: main

    # 헬스체크 경로
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # DB 연결 — Render PostgreSQL 서비스와 연동 (아래 databases 섹션 참고)
      - key: DATABASE_URL
        fromDatabase:
          name: anotherone-db
          property: connectionString

      # JWT 시크릿 — Render 대시보드에서 직접 입력 (절대 코드에 넣지 말 것)
      - key: JWT_SECRET
        sync: false   # 대시보드에서 수동으로 값 입력

      # 프론트엔드 주소 — Vercel 배포 후 입력
      - key: FRONTEND_URL
        sync: false   # 대시보드에서 수동으로 값 입력

      # 서버 포트 (Render가 자동으로 PORT 환경변수를 주입함)
      - key: PORT
        value: "3001"

      # Self-Ping(Keep-Alive)을 위한 서버 외부 URL
      - key: RENDER_EXTERNAL_URL
        value: "https://anotherone-tjgi.onrender.com"

# ─── PostgreSQL 데이터베이스 ─────────────────────────────
databases:
  - name: anotherone-db
    databaseName: anotherone
    user: anotherone_user
    region: singapore
    plan: free          # 무료 플랜 (90일 후 만료 주의)
