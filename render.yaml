databases:
  - name: anotherone-db
    databaseName: anotherone
    user: anotherone_user
    plan: free

services:
  - type: web
    name: anotherone-api
    env: node
    plan: free
    buildCommand: "npm install && npx turbo run build --filter=api"
    startCommand: "npm run start:prod --workspace=apps/api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anotherone-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
