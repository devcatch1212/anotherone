name: geumumu
description: "AnotherOne 근무관리 - 출퇴근 & 급여 확인"
publish_to: 'none'
version: 1.2.0+19

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # 네트워크
  dio: ^5.8.0+1

  # 보안 저장소
  flutter_secure_storage: ^9.2.4

  # 일반 설정 저장
  shared_preferences: ^2.5.3

  # GPS
  geolocator: ^13.0.4

  # 위치 권한
  permission_handler: ^11.4.0

  # 날짜/시간
  intl: ^0.20.2

  # 캘린더
  table_calendar: ^3.2.0

  # 차트
  fl_chart: ^0.70.2

  # 폰트
  google_fonts: ^6.2.1

  # 앱 버전 정보 및 스토어 런처
  package_info_plus: ^8.2.0
  url_launcher: ^6.3.1

  # 웹뷰 (주소 및 지도)
  webview_flutter: ^4.10.0
  uuid: ^4.5.3

  # Firebase Analytics
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.6

  # 로컬 알림 (출퇴근 알림)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
